<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../CSS/payment.css">
        <script src="../JS/payment.js"></script>

</head>
<body>
    <div class="container">
        
        <form action="/submit-payment" method="POST">
            <label for="card-number">Card Number:</label>
            <input type="number" class="card-number" name="card-number" maxlength="16" required>

            <label for="name">Name on Card:</label>
            <input type="text" class="name" name="name" required>

            <label for="expiry-date">Expiry Date:</label>
            <input type="date" class="expiry-date" name="expiry-date" required>

            <label for="cvv">CVV:</label>
            <input type="text" class="cvv" name="cvv" required>

            <button type="submit" class="pay">Pay Now</button>
        </form>
    </div>
    
</body>
</html>
